<!-- ── Navbar Partial ── -->
<header class="sticky top-0 z-50 bg-white border-b border-border transition-all duration-300">
  <div class="max-w-[82rem] mx-auto px-6">
    <div class="flex items-center h-16 lg:h-[4.5rem]">

      <!-- Logo (Dark Variant) -->
      <a href="/" class="shrink-0 cursor-pointer" aria-label="AAA Home">
        <svg viewBox="0 0 280 40" class="h-8 lg:h-9 w-auto" fill="none" xmlns="http://www.w3.org/2000/svg"
             role="img" aria-label="ASEAN Attorneys Alliance">
          <!-- Stylized A mark -->
          <path d="M2 36L18 4L34 36H28L18 12L8 36H2Z" fill="#0A1628"/>
          <line x1="8" y1="26" x2="28" y2="26" stroke="#0A1628" stroke-width="2.5"/>
          <!-- SEAN ATTORNEYS ALLIANCE -->
          <text x="42" y="18" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="13"
                font-weight="700" letter-spacing="0.15em" fill="#0A1628">SEAN ATTORNEYS ALLIANCE</text>
          <!-- Tagline -->
          <text x="42" y="33" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="8"
                font-weight="500" letter-spacing="0.2em" fill="#64748B">A UNITY OF PROFICIENCY</text>
        </svg>
      </a>

      <!-- Desktop Navigation — centered -->
      <nav class="hidden lg:flex items-center justify-center flex-1" aria-label="Main navigation">
        <a href="/about/"
           class="px-4 py-2 text-[0.6875rem] font-semibold tracking-[0.12em] uppercase text-text-muted hover:text-navy transition-colors whitespace-nowrap">
          About
        </a>

        <!-- Our Network (Dropdown) -->
        <div class="nav-dropdown relative" id="network-dropdown">
          <button type="button"
                  class="px-4 py-2 text-[0.6875rem] font-semibold tracking-[0.12em] uppercase text-text-muted hover:text-navy transition-colors whitespace-nowrap inline-flex items-center gap-1.5"
                  aria-expanded="false" aria-haspopup="true">
            Our Network
            <i data-lucide="chevron-down" class="w-3 h-3 transition-transform duration-200"></i>
          </button>
          <div class="dropdown-panel absolute top-full left-1/2 pt-2 z-50">
            <div class="bg-white border border-border shadow-[0_12px_40px_rgba(10,22,40,0.1)] min-w-[260px]">
              <a href="/member-firms/"
                 class="block px-5 py-3.5 transition-colors group hover:bg-surface border-l-2 border-transparent hover:border-gold/50">
                <span class="block text-[0.7rem] font-semibold tracking-[0.1em] uppercase text-text-muted group-hover:text-navy">
                  Member Firms
                </span>
                <span class="block text-[0.7rem] text-text-light mt-0.5 normal-case tracking-normal font-normal">
                  Find trusted law firms across ASEAN
                </span>
              </a>
              <div class="h-px bg-gradient-to-r from-transparent via-gold/40 to-transparent mx-4"></div>
              <a href="/business-guides/"
                 class="block px-5 py-3.5 transition-colors group hover:bg-surface border-l-2 border-transparent hover:border-gold/50">
                <span class="block text-[0.7rem] font-semibold tracking-[0.1em] uppercase text-text-muted group-hover:text-navy">
                  Business Guides
                </span>
                <span class="block text-[0.7rem] text-text-light mt-0.5 normal-case tracking-normal font-normal">
                  Jurisdiction guides for doing business
                </span>
              </a>
            </div>
          </div>
        </div>

        <a href="/practice-areas/"
           class="px-4 py-2 text-[0.6875rem] font-semibold tracking-[0.12em] uppercase text-text-muted hover:text-navy transition-colors whitespace-nowrap">
          Practice Areas
        </a>

        <a href="/news/"
           class="px-4 py-2 text-[0.6875rem] font-semibold tracking-[0.12em] uppercase text-text-muted hover:text-navy transition-colors whitespace-nowrap">
          News &amp; Insights
        </a>

        <a href="/join/"
           class="px-4 py-2 text-[0.6875rem] font-semibold tracking-[0.12em] uppercase text-text-muted hover:text-navy transition-colors whitespace-nowrap">
          Join AAA
        </a>

        <a href="/contact/"
           class="px-4 py-2 text-[0.6875rem] font-semibold tracking-[0.12em] uppercase text-text-muted hover:text-navy transition-colors whitespace-nowrap">
          Contact
        </a>
      </nav>

      <!-- Right Side: Divider + CTA + Mobile Hamburger -->
      <div class="flex items-center shrink-0 ml-auto lg:ml-0">
        <div class="hidden lg:block w-px h-6 bg-border mx-3"></div>
        <!-- Find a Firm Button (desktop) -->
        <a href="/member-firms/"
           class="hidden lg:inline-flex items-center gap-1.5 ml-3 px-5 py-2 bg-navy text-white font-semibold text-[0.65rem] tracking-[0.12em] uppercase hover:bg-gold transition-all duration-300 whitespace-nowrap">
          <i data-lucide="search" class="w-3.5 h-3.5"></i>
          Find a Firm
        </a>

        <!-- Mobile Hamburger -->
        <button id="mobile-menu-btn" type="button"
                class="lg:hidden p-2 ml-1 text-text-muted hover:text-navy transition-colors"
                aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-menu">
          <span class="hamburger-icon">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </span>
          <span class="close-icon hidden">
            <i data-lucide="x" class="w-5 h-5"></i>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="mobile-menu lg:hidden bg-white border-t border-border">
    <div class="max-w-[82rem] mx-auto px-6 py-4">
      <nav class="flex flex-col gap-1" aria-label="Mobile navigation">
        <a href="/about/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          About
        </a>
        <a href="/member-firms/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          Member Firms
        </a>
        <a href="/business-guides/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          Business Guides
        </a>
        <a href="/practice-areas/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          Practice Areas
        </a>
        <a href="/news/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          News &amp; Insights
        </a>
        <a href="/join/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          Join AAA
        </a>
        <a href="/contact/"
           class="px-4 py-3 text-[0.75rem] font-semibold tracking-[0.1em] uppercase text-text-muted hover:text-navy transition-colors">
          Contact
        </a>

        <!-- Mobile Find a Firm -->
        <div class="pt-3 mt-2 border-t border-border">
          <a href="/member-firms/"
             class="inline-flex items-center gap-2 px-5 py-3 bg-navy text-white text-[0.6875rem] font-semibold tracking-[0.1em] uppercase hover:bg-gold transition-colors w-full justify-center">
            <i data-lucide="search" class="w-3.5 h-3.5"></i>
            Find a Firm
          </a>
        </div>
      </nav>
    </div>
  </div>
</header>
