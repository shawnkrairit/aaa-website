<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>

            gold: '#A17C45',
            'gold-light': '#C4A265',

            body: ['Montserrat', 'Helvetica Neue', 'sans-serif'],

      },
      plugins: [
        function({ addBase }) {
          addBase({

              fontFamily: "'Cormorant', Georgia, serif",
              color: '#0A1628',
